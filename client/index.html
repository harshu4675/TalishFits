<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=5.0"
    />
    <meta name="theme-color" content="#0d3d35" />
    <meta
      name="description"
      content="TalishFits — AI-powered fitness platform."
    />

    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="TalishFits" />
    <meta name="mobile-web-app-capable" content="yes" />

    <title>TalishFits — Train Smarter. Live Better.</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@300;400;500;600;700;800&family=Caveat:wght@500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      html {
        background: #e8ebe5;
      }
      body {
        margin: 0;
        background: #e8ebe5;
        color: #1a1a1a;
        font-family: "Inter", sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      #root {
        min-height: 100vh;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          if (
            window.location.hostname === "localhost" ||
            window.location.hostname === "127.0.0.1"
          ) {
            navigator.serviceWorker.getRegistrations().then((regs) => {
              regs.forEach((reg) => reg.unregister());
            });
            caches.keys().then((names) => {
              names.forEach((name) => caches.delete(name));
            });
          } else {
            navigator.serviceWorker
              .register("/sw.js")
              .then(() => console.log("SW registered"))
              .catch(() => console.log("SW registration failed"));
          }
        });
      }
    </script>
  </body>
</html>
